name: daily-job-update

on:
  schedule:
    - cron: '15 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-job-postings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update daily job postings
        run: python scripts/update_job_postings.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/job-postings.json site/data/site-metadata.json
          if git diff --cached --quiet; then
            echo "No new jobs found; nothing to commit."
          else
            git commit -m "chore: add daily AI job breakdown"
            git push
          fi
